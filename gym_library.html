<script>
        const exercises = {
            'Biceps': ['Hammer Curl', 'Barbell Curl', 'Incline Dumbbell Curl', 'Preacher Curl', 'Concentration Curl'],
            'Chest': ['Flat Bench Press', 'Incline Dumbbell Press', 'Chest Fly', 'Push-ups', 'Dips'],
            'Back': ['Deadlift', 'Lat Pulldown', 'Bent Over Row', 'Pull-ups', 'Face Pulls'],
            'Legs': ['Back Squat', 'Leg Press', 'Hamstring Curls', 'Calf Raises', 'Lunges'],
            'Shoulders': ['Overhead Press', 'Lateral Raise', 'Front Raise', 'Reverse Pec Deck'],
            'Triceps': ['Tricep Pushdown', 'Skull Crushers', 'Close Grip Bench Press', 'Overhead Extension']
        };

        function filterExercises(category) {
            const grid = document.getElementById('category-grid');
            const filteredView = document.getElementById('filtered-view');
            const title = document.getElementById('category-title');
            const list = document.getElementById('exercise-list');

            title.innerText = category;
            list.innerHTML = '';

            exercises[category].forEach(ex => {
                const item = document.createElement('div');
                item.className = 'glass-card p-md rounded-xl flex items-center justify-between border-l-4 border-primary-container active:scale-95 transition-transform';
                item.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-title-md text-title-md text-on-surface">${ex}</span>
                        <span class="font-label-lg text-label-lg text-on-surface-variant">4 Sets • 8-12 Reps</span>
                    </div>
                    <span class="material-symbols-outlined text-primary-container">chevron_right</span>
                `;
                list.appendChild(item);
            });

            grid.classList.add('hidden');
            filteredView.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetGrid() {
            const grid = document.getElementById('category-grid');
            const filteredView = document.getElementById('filtered-view');

            filteredView.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        // Micro-interaction: visual feedback for tap
        document.querySelectorAll('[onclick]').forEach(el => {
            el.addEventListener('mousedown', () => el.classList.add('opacity-70'));
            el.addEventListener('mouseup', () => el.classList.remove('opacity-70'));
            el.addEventListener('mouseleave', () => el.classList.remove('opacity-70'));
        });
    </script>
